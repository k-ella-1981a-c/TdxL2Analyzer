# GitHub Actions - 自动构建 Android APK
name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v3

    # Download Android command line tools (official)
    - name: Install Android CMD Tools
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
        unzip -q tools.zip
        mv cmdline-tools latest

    - name: Install Android SDK components
      env:
        ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          "platform-tools"
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "SDK installed:"
        ls $ANDROID_HOME/platforms/
        ls $ANDROID_HOME/build-tools/

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Create release keystore
      run: |
        keytool -genkeypair \
          -alias tdxL2 \
          -keypass tdxL2@2026 \
          -keystore release.keystore \
          -storepass tdxL2@2026 \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=TdxL2 Analyzer, OU=Release, O=TDX, L=Unknown, ST=Unknown, C=CN"

    - name: Build with Gradle
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload APK artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TdxL2Analyzer-Release-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Check APK exists
      if: success()
      run: |
        find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \;
